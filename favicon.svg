<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg { fill: #111111; }
    .fg { fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #ffffff; }
      .fg { fill: #111111; }
    }
  </style>
  <rect class="bg" x="0" y="0" width="100" height="100" rx="22" ry="22"/>
  <text class="fg" x="50" y="50"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-weight="700"
        font-size="62"
        text-anchor="middle"
        dominant-baseline="central">F</text>
</svg>
